server {

  listen 443 ssl;
  server_name domki.osrodeksloneczko.pl www.domki.osrodeksloneczko.pl;
  ssl_certificate /etc/nginx/letsencrypt/live/domki.osrodeksloneczko.pl/fullchain.pem;
  ssl_certificate_key /etc/nginx/letsencrypt/live/domki.osrodeksloneczko.pl/privkey.pem;

  location / {
    proxy_pass        http://reactui2:80/;
    proxy_redirect    default;
    proxy_set_header  Host $host;
    proxy_set_header  X-Real-IP $remote_addr;
    proxy_set_header  X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header  X-Forwarded-Host $server_name;
  }


  location /pyramid/ {
    proxy_pass        http://pyramid:6543/;
    proxy_redirect    default;
    proxy_set_header  Host $host;
    proxy_set_header  X-Real-IP $remote_addr;
    proxy_set_header  X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header  X-Forwarded-Host $server_name;
  }

  location /backend/ {
    proxy_pass        http://backend:1337/;
    proxy_redirect    default;
    proxy_set_header  Host $host;
    proxy_set_header  X-Real-IP $remote_addr;
    proxy_set_header  X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header  X-Forwarded-Host $server_name;
  }

}